name: Run Tests
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
jobs:
  test:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        python-version: ['3.13']
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r tp53_rag/requirements.txt
        pip install pytest pytest-cov langchain-ollama
    
    - name: Run tests with pytest
      env:
          PYTHONPATH: ${{ github.workspace }}/tp53_rag
      run: python -m pytest tp53_rag/tests/ -v --cov=tp53_rag --cov-report=xml -m "not integration"
 
    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v3
      with:
        file: ./coverage.xml